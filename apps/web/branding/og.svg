<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0b0c0f"/>

  <!-- top: wordmark -->
  <text x="80" y="110" font-size="32" font-weight="600"
        font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <tspan fill="#ffffff">story</tspan><tspan fill="#71717a">pointless</tspan>
  </text>

  <!-- main headline: two lines -->
  <text x="80" y="320" font-size="84" font-weight="600" fill="#ffffff"
        font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    What planning poker
  </text>
  <text x="80" y="420" font-size="84" font-weight="600" fill="#ffffff"
        font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    was meant to be.
  </text>

  <!-- struck-through fibonacci numbers -->
  <g font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
     font-size="30" font-weight="500" fill="#52525b">
    <text x="80" y="540">1</text>
    <text x="135" y="540">2</text>
    <text x="190" y="540">3</text>
    <text x="245" y="540">5</text>
    <text x="300" y="540">8</text>
    <text x="355" y="540">13</text>
    <text x="425" y="540">21</text>
    <line x1="72" y1="530" x2="465" y2="530" stroke="#52525b" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- domain anchor at bottom right -->
  <text x="1120" y="585" text-anchor="end" font-size="22" font-weight="500" fill="#71717a"
        font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    storypointless.com
  </text>
</svg>
